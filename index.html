<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistemas Managua - Portal de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; -webkit-tap-highlight-color: transparent; }
        .fade-in-up { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen text-slate-50 flex flex-col items-center justify-center p-6 relative overflow-x-hidden selection:bg-cyan-500 selection:text-white">

    <button onclick="abrirModal()" class="absolute top-4 right-4 md:top-6 md:right-6 glass-card p-3 md:px-4 md:py-3 rounded-xl flex items-center gap-2 hover:bg-slate-800/90 hover:border-cyan-500/50 transition-all z-20 active:scale-95">
        <span class="text-xs font-bold text-slate-300 uppercase tracking-wider">Admin</span>
    </button>

    <div class="w-full max-w-5xl relative z-10 flex flex-col items-center">
        <header class="text-center mb-14 fade-in-up">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-3">
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-200 to-cyan-400">Sistemas Managua</span>
            </h1>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-[320px] md:max-w-md">
            <a href="https://hermexcontacto-creator.github.io/Control-Managuas-2/pedidos.html" class="glass-card group flex flex-col items-center p-8 rounded-[2rem] transition-all hover:border-cyan-500/50">
                <h2 class="text-lg font-semibold text-slate-100">Pedidos Managuas</h2>
            </a>
            <a href="https://hermexcontacto-creator.github.io/Control-Managuas-2/tanques.html" class="glass-card group flex flex-col items-center p-8 rounded-[2rem] transition-all hover:border-cyan-500/50">
                <h2 class="text-lg font-semibold text-slate-100">Tanques Managuas</h2>
            </a>
        </main>
    </div>

    <div id="modal-admin" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/90 backdrop-blur-sm">
        <div class="glass-card p-6 rounded-3xl w-full max-w-xs border border-slate-700 shadow-2xl">
            <h3 class="text-lg font-bold text-white mb-4 text-center">Acceso Administrador</h3>
            <input type="password" id="pass-input" placeholder="Contraseña..." class="w-full bg-slate-800 text-white p-4 rounded-xl border border-slate-700 mb-4 focus:outline-none focus:border-cyan-500 placeholder-slate-500">
            <div class="flex gap-3">
                <button onclick="cerrarModal()" class="flex-1 py-3 rounded-xl bg-slate-700 text-slate-300 font-semibold">Cancelar</button>
                <button id="btn-entrar" onclick="verificarAdmin()" class="flex-1 py-3 rounded-xl bg-cyan-600 text-white font-semibold">Entrar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyRbNWYVtixYXYAG4xPCWOlXmz3CcLQfGiAo4dN7CbL98lHRqv0wcqvOufq6hzcdq0k/exec";

        function abrirModal() { document.getElementById('modal-admin').classList.remove('hidden'); }
        function cerrarModal() { document.getElementById('modal-admin').classList.add('hidden'); }

        async function verificarAdmin() {
            const password = document.getElementById('pass-input').value;
            const btn = document.getElementById('btn-entrar');
            if (!password) return;

            btn.innerText = "Validando...";
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "login", password: password })
                });
                const result = await response.json();
                
                if (result.success) {
                    window.location.href = "admin.html";
                } else {
                    alert("Contraseña incorrecta");
                }
            } catch (error) {
                alert("Error de conexión");
            } finally {
                btn.innerText = "Entrar";
                btn.disabled = false;
                cerrarModal();
                document.getElementById('pass-input').value = "";
            }
        }
    </script>
</body>
</html>

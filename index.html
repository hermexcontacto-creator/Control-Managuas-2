<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistemas Managua - Portal de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; -webkit-tap-highlight-color: transparent; }
        .fade-in-up { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen text-slate-50 flex flex-col items-center justify-center p-6 relative overflow-x-hidden selection:bg-cyan-500 selection:text-white">

    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-cyan-600/20 rounded-full blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-600/10 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <button onclick="verificarAdmin()" class="absolute top-4 right-4 md:top-6 md:right-6 glass-card p-3 md:px-4 md:py-3 rounded-xl flex items-center gap-2 hover:bg-slate-800/90 hover:border-cyan-500/50 hover:shadow-[0_0_20px_-5px_rgba(6,182,212,0.4)] transition-all duration-300 z-20 group active:scale-95">
        <svg class="w-5 h-5 text-cyan-500 group-hover:text-cyan-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        <span class="text-xs font-bold text-slate-300 group-hover:text-white uppercase tracking-wider hidden sm:block transition-colors">Admin</span>
    </button>

    <div class="w-full max-w-5xl relative z-10 flex flex-col items-center">
        <header class="text-center mb-14 fade-in-up">
            <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold tracking-tight mb-3">
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-200 to-cyan-400">Sistemas Managua</span>
            </h1>
            <p class="text-xs md:text-sm font-bold tracking-[0.25em] text-cyan-500/80 uppercase">Portal de Control</p>
        </header>

        <main class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-[320px] md:max-w-none">
            <a href="https://hermexcontacto-creator.github.io/Control-Managuas-2/pedidos.html" class="glass-card group flex flex-col items-center justify-center p-8 rounded-[2rem] transition-all duration-300 hover:-translate-y-2 hover:border-cyan-500/50 hover:bg-slate-800/90 hover:shadow-[0_0_40px_-10px_rgba(6,182,212,0.4)] active:scale-95 fade-in-up delay-100 relative overflow-hidden">
                <div class="w-20 h-20 rounded-2xl bg-cyan-500/10 text-cyan-400 flex items-center justify-center mb-5 group-hover:scale-110 group-hover:bg-cyan-500 group-hover:text-white transition-all"><svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg></div>
                <h2 class="text-lg md:text-xl font-semibold tracking-wide text-slate-100">Pedidos Managuas</h2>
            </a>

            <a href="https://hermexcontacto-creator.github.io/Control-Managuas-2/tanques.html" class="glass-card group flex flex-col items-center justify-center p-8 rounded-[2rem] transition-all duration-300 hover:-translate-y-2 hover:border-cyan-500/50 hover:bg-slate-800/90 hover:shadow-[0_0_40px_-10px_rgba(6,182,212,0.4)] active:scale-95 fade-in-up delay-200 relative overflow-hidden">
                <div class="w-20 h-20 rounded-2xl bg-cyan-500/10 text-cyan-400 flex items-center justify-center mb-5 group-hover:scale-110 group-hover:bg-cyan-500 group-hover:text-white transition-all"><svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"></path></svg></div>
                <h2 class="text-lg md:text-xl font-semibold tracking-wide text-slate-100">Tanques Managuas</h2>
            </a>

            <a id="btn-cuadre" href="https://hermexcontacto-creator.github.io/Control-Managuas-2/cuadre.html" class="hidden glass-card group flex-col items-center justify-center p-8 rounded-[2rem] transition-all duration-300 hover:-translate-y-2 hover:border-cyan-500/50 hover:bg-slate-800/90 hover:shadow-[0_0_40px_-10px_rgba(6,182,212,0.4)] active:scale-95 fade-in-up delay-300 relative overflow-hidden">
                <div class="w-20 h-20 rounded-2xl bg-cyan-500/10 text-cyan-400 flex items-center justify-center mb-5 group-hover:scale-110 group-hover:bg-cyan-500 group-hover:text-white transition-all"><svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg></div>
                <h2 class="text-lg md:text-xl font-semibold tracking-wide text-slate-100">Cuadre Managuas</h2>
            </a>
        </main>
    </div>

    <script>
        // Al cargar la página, verificamos si ya eres "Élite"
        window.onload = () => {
            if (localStorage.getItem("modo_elite") === "true") {
                document.getElementById("btn-cuadre").classList.remove("hidden");
                document.getElementById("btn-cuadre").classList.add("flex");
            }
        };

        async function verificarAdmin() {
            const password = prompt("🔒 Ingrese la contraseña:");
            if (!password) return;

            const btn = document.querySelector('button[onclick="verificarAdmin()"]');
            const span = btn.querySelector('span');
            const textoOriginal = span ? span.innerText : "ADMIN";
            if (span) span.innerText = "VERIFICANDO...";
            btn.disabled = true;

            // --- PEGA AQUÍ TU URL (la que obtuviste en la Nueva Implementación) ---
            const API_URL = "https://script.google.com/macros/s/AKfycbyRbNWYVtixYXYAG4xPCWOlXmz3CcLQfGiAo4dN7CbL98lHRqv0wcqvOufq6hzcdq0k/exec";

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "login", password: password })
                });
                const result = await response.json();
                
                if (result.success) {
                    if (result.role === "elite") {
                        // Desbloqueo Élite
                        localStorage.setItem("modo_elite", "true");
                        document.getElementById("btn-cuadre").classList.remove("hidden");
                        document.getElementById("btn-cuadre").classList.add("flex");
                        alert("✅ Modo Élite Activado");
                    } else {
                        // Acceso Administrador normal
                        window.location.href = "admin.html";
                    }
                } else {
                    alert("❌ Contraseña incorrecta.");
                }
            } catch (error) {
                alert("❌ Error de conexión.");
            } finally {
                if (span) span.innerText = textoOriginal;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

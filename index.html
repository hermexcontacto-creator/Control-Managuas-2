<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora POS - Agua Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; font-family: 'Nunito', sans-serif; user-select: none; overflow-x: hidden; touch-action: manipulation; }
        .toy-btn { @apply rounded-2xl flex flex-col items-center justify-center font-black transition-all duration-75 relative; border-bottom: 4px solid; background-color: white; border-color: #e2e8f0; color: #475569; }
        .toy-btn:active { transform: translateY(2px); border-bottom-width: 1px; margin-bottom: 1px; }
        .btn-blue-outline { border-color: #3b82f6; color: #2563eb; background-color: #eff6ff; }
        .btn-blue-solid { background-color: #3b82f6 !important; border-color: #1d4ed8 !important; color: white !important; }
        .btn-active { background-color: #3b82f6 !important; border-color: #1d4ed8 !important; color: white !important; box-shadow: 0 0 10px rgba(59, 130, 246, 0.4); }
        .btn-promo { border-color: #f59e0b; color: #d97706; background-color: #fffbeb; }
        .btn-promo-active { background-color: #f59e0b !important; border-color: #b45309 !important; color: white !important; box-shadow: 0 0 10px rgba(245, 158, 11, 0.4); }
        .btn-maint { border-color: #10b981; color: #059669; background-color: #ecfdf5; }
        .btn-maint-active { background-color: #10b981 !important; border-color: #047857 !important; color: white !important; }
        .btn-green-solid { background-color: #10b981 !important; border-color: #047857 !important; color: white !important; }
        .glass-display { @apply bg-white rounded-3xl p-3 text-center border-b-4 border-blue-100 shadow-sm mb-2; }
        #bcv-rate { @apply bg-slate-100 border-2 border-slate-200 rounded-lg px-2 py-1 text-center font-black text-blue-600 outline-none w-32 text-base; transition: all 0.2s; }
        #bcv-rate:focus { @apply border-blue-400 bg-white; }
        .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    </style>
</head>
<body class="p-2 flex flex-col items-center min-h-screen relative">
    <section class="w-full max-w-md mx-auto">
        <div class="sticky top-0 z-10 bg-[#f1f5f9] pb-2 pt-2">
            <div class="glass-display">
                <div class="flex justify-between items-start mb-1">
                    <div class="flex flex-col items-start relative">
                        <span id="tasa-label" class="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1">Tasa BCV (Manual)</span>
                        <div class="flex items-center gap-1">
                            <input type="text" id="bcv-rate" placeholder="00,0000" inputmode="decimal" oninput="handleTasaChange(this.value)">
                        </div>
                    </div>
                    <div class="flex flex-col items-center">
                        <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Total Bs.</span>
                        <span id="total-display" class="text-3xl font-black text-slate-800 tracking-tighter">0,00</span>
                    </div>
                    <div class="flex flex-col items-end">
                        <span class="text-[8px] font-black text-blue-400 uppercase">Cant.</span>
                        <span id="qty-display" class="text-2xl font-black text-blue-500">1</span>
                    </div>
                </div>
            </div>
            <div id="promo-banner" class="hidden bg-amber-100 border-2 border-amber-200 p-2 rounded-xl mb-2 text-center">
                <p id="promo-msg" class="text-[10px] font-black text-amber-700"></p>
            </div>
            <div class="grid grid-cols-5 gap-1.5 mb-3">
                <button onclick="selectProduct('b19')" id="btn-b19" class="toy-btn h-11"><span class="text-lg">🚰</span><span class="text-[6px] font-black uppercase">R. 19L</span></button>
                <button onclick="selectProduct('b12')" id="btn-b12" class="toy-btn h-11"><span class="text-lg">💧</span><span class="text-[6px] font-black uppercase">R. 12L</span></button>
                <button onclick="selectProduct('b8')" id="btn-b8" class="toy-btn h-11"><span class="text-lg">🏺</span><span class="text-[6px] font-black uppercase">R. 8L</span></button>
                <button onclick="selectProduct('b5')" id="btn-b5" class="toy-btn h-11"><span class="text-lg">🥤</span><span class="text-[6px] font-black uppercase">B. 5L</span></button>
                <button onclick="selectProduct('tapa')" id="btn-tapa" class="toy-btn h-11 btn-blue-outline"><span class="text-lg">🔘</span><span class="text-[6px] font-black uppercase">Tapa</span></button>
                <button onclick="selectProduct('hielo')" id="btn-hielo" class="toy-btn h-11 btn-blue-outline"><span class="text-lg">🧊</span><span class="text-[6px] font-black uppercase">Hielo</span></button>
                <button onclick="selectProduct('n19')" id="btn-n19" class="toy-btn h-11 btn-blue-outline"><span class="text-lg">✨</span><span class="text-[6px] font-black uppercase">N. 19L</span></button>
                <button onclick="selectProduct('n12')" id="btn-n12" class="toy-btn h-11 btn-blue-outline"><span class="text-lg">🌟</span><span class="text-[6px] font-black uppercase">N. 12L</span></button>
                <button onclick="selectProduct('mantenimiento')" id="btn-mantenimiento" class="toy-btn h-11 btn-maint"><span class="text-lg">🛠️</span><span class="text-[6px] font-black uppercase">Manten.</span></button>
                <button onclick="togglePromo()" id="btn-promo" class="toy-btn h-11 btn-promo"><span class="text-lg">📅</span><span class="text-[6px] font-black uppercase">Oferta</span></button>
            </div>
            <div class="bg-blue-50/80 p-3 rounded-[2rem] border-2 border-blue-100 shadow-inner">
                <div class="numpad-grid mb-3">
                    <button onclick="appendQty(1)" class="toy-btn h-12 text-xl">1</button>
                    <button onclick="appendQty(2)" class="toy-btn h-12 text-xl">2</button>
                    <button onclick="appendQty(3)" class="toy-btn h-12 text-xl">3</button>
                    <button onclick="appendQty(4)" class="toy-btn h-12 text-xl">4</button>
                    <button onclick="appendQty(5)" class="toy-btn h-12 text-xl">5</button>
                    <button onclick="appendQty(6)" class="toy-btn h-12 text-xl">6</button>
                    <button onclick="appendQty(7)" class="toy-btn h-12 text-xl">7</button>
                    <button onclick="appendQty(8)" class="toy-btn h-12 text-xl">8</button>
                    <button onclick="appendQty(9)" class="toy-btn h-12 text-xl">9</button>
                    <button onclick="clearQty()" class="toy-btn h-12 text-sm text-rose-500 border-rose-200 font-black">C</button>
                    <button onclick="appendQty(0)" class="toy-btn h-12 text-xl">0</button>
                    <button onclick="addToCart()" class="toy-btn btn-blue-solid h-12 text-base">OK</button>
                </div>
                <div class="flex gap-2 w-full">
                    <button onclick="resetCart()" class="toy-btn w-1/3 py-2 text-[10px] font-black text-rose-400 border-rose-200 uppercase">Borrar</button>
                    <button onclick="openCheckout()" class="toy-btn btn-green-solid w-2/3 py-2 text-sm uppercase tracking-wider flex flex-row gap-2"><span>💸</span> COBRAR</button>
                </div>
            </div>
        </div>
        <div id="cart-list" class="space-y-2 mt-4 pb-10">
            <div class="text-center p-8 text-slate-300 font-bold italic text-sm">Carrito vacío</div>
        </div>
    </section>
    <div id="checkout-modal" class="hidden fixed inset-0 z-50 bg-slate-900/60 flex flex-col justify-end">
        <div class="bg-white rounded-t-3xl p-5 shadow-2xl transition-transform duration-300 translate-y-full" id="checkout-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-black text-slate-800 tracking-tight">Pagos y Vuelto</h2>
                <button onclick="closeCheckout()" class="text-slate-400 font-bold text-lg px-3 py-1 bg-slate-100 rounded-full">✕</button>
            </div>
            <div class="bg-blue-50 border-2 border-blue-200 rounded-2xl p-4 text-center mb-4">
                <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest block mb-1">Total del Ticket</span>
                <span id="co-total-display" class="text-4xl font-black text-blue-700 tracking-tighter">0,00</span>
                <span class="text-xs font-bold text-blue-500 ml-1">Bs.</span>
            </div>
            <div class="space-y-3 mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-emerald-100 flex items-center justify-center text-xl shadow-sm border border-emerald-200">💵</div>
                    <div class="flex-1">
                        <label class="text-[9px] font-black text-slate-500 uppercase tracking-wider mb-1 block">Efectivo Recibido (Bs)</label>
                        <input type="number" step="0.01" id="pay-cash" class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl px-3 py-2 text-lg font-black text-slate-800 outline-none focus:border-emerald-400 focus:bg-white transition-colors" placeholder="0" oninput="calculateChange()">
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-indigo-100 flex items-center justify-center text-xl shadow-sm border border-indigo-200">💳</div>
                    <div class="flex-1">
                        <label class="text-[9px] font-black text-slate-500 uppercase tracking-wider mb-1 block">Punto / Pago Móvil (Bs)</label>
                        <input type="number" step="0.01" id="pay-digital" class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl px-3 py-2 text-lg font-black text-slate-800 outline-none focus:border-indigo-400 focus:bg-white transition-colors" placeholder="0" oninput="calculateChange()">
                    </div>
                </div>
            </div>
            <div id="change-box" class="rounded-2xl p-4 text-center border-2 mb-4 bg-slate-100 border-slate-200">
                <span id="change-label" class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1">Resta por Pagar</span>
                <span id="change-display" class="text-3xl font-black text-slate-800 tracking-tighter">0,00</span>
                <span class="text-xs font-bold ml-1">Bs.</span>
            </div>
            <button onclick="completeSale()" class="w-full toy-btn btn-green-solid h-14 text-lg font-black uppercase tracking-widest">✅ Completar Venta</button>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'agua-pro-manual';

        let user = null;
        let saveTimeout = null;
        
        window.roundBs = (num) => +(Math.round(num + "e+2")  + "e-2");

        const BS_PRICES = { 
            b19: 230, 
            b12: 180, 
            b8: 90,   
            b5: 80    
        };
        const USD_PRICES = { 
            n19: 20, 
            n12: 18, 
            hielo: 2.5, 
            mantenimiento: 3.5, 
            tapa: 0.15 
        };
        
        const CODES = { b19: 8, b12: 4, b8: "X", b5: 2, n19: 6, n12: 5, hielo: 7, tapa: "X", mantenimiento: "M" };
        const COMBO_CODES = { b19_tapa: 3, b12_tapa: 1 };
        
        let calcState = { 
            qty: "", product: null, promo: false, 
            cart: { b19:0, b12:0, b8:0, b5:0, n19:0, n12:0, hielo:0, tapa:0, mantenimiento:0 },
            currentTotal: 0
        };

        window.handleTasaChange = (val) => {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => saveTasaToDB(val), 1000);
            renderCart();
        };

        async function saveTasaToDB(val) {
            if(!user || !val) return;
            try {
                const cleanVal = val.replace(',', '.');
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'bcv');
                await setDoc(ref, { val: cleanVal, updatedAt: Date.now() });
                updateTasaLabel("Guardado", "text-blue-500");
            } catch (e) { console.error(e); }
        }

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                syncTasa();
                if (new Date().getDay() === 4) togglePromo(true);
            }
        });

        async function syncTasa() {
            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'bcv');
            onSnapshot(ref, (snap) => {
                if(snap.exists()){
                    const data = snap.data();
                    const input = document.getElementById('bcv-rate');
                    if (document.activeElement !== input) {
                        input.value = data.val.replace('.', ',');
                    }
                    const date = new Date(data.updatedAt);
                    const today = new Date();
                    const isToday = date.getDate() === today.getDate() && date.getMonth() === today.getMonth() && date.getFullYear() === today.getFullYear();
                    if (isToday) updateTasaLabel("Actualizada hoy", "text-green-500");
                    else updateTasaLabel("Tasa de ayer o antes", "text-amber-500 underline");
                    renderCart();
                }
            }, (err) => console.error(err));
        }

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else { await signInAnonymously(auth); }
        };
        initAuth();

        window.selectProduct = (id) => {
            calcState.product = id;
            document.querySelectorAll('.toy-btn').forEach(b => { if(b.id !== 'btn-promo') b.classList.remove('btn-active'); });
            const target = document.getElementById(`btn-${id}`);
            if(target) target.classList.add('btn-active');
        };
        
        window.appendQty = (n) => { if(calcState.qty.length < 3) calcState.qty += n; document.getElementById('qty-display').innerText = calcState.qty || "1"; };
        window.clearQty = () => { calcState.qty = ""; document.getElementById('qty-display').innerText = "1"; };
        
        window.togglePromo = (force = null) => { 
            calcState.promo = force !== null ? force : !calcState.promo; 
            const btn = document.getElementById('btn-promo');
            if(btn) btn.classList.toggle('btn-promo-active', calcState.promo); 
            renderCart(); 
        };
        
        window.resetCart = () => { calcState.cart = { b19:0, b12:0, b8:0, b5:0, n19:0, n12:0, hielo:0, tapa:0, mantenimiento:0 }; renderCart(); };
        window.addToCart = () => { if(!calcState.product) return; calcState.cart[calcState.product] += parseInt(calcState.qty) || 1; window.clearQty(); renderCart(); };

        window.renderCart = () => {
            const list = document.getElementById('cart-list');
            const rateInput = document.getElementById('bcv-rate').value;
            const rate = parseFloat(rateInput.replace(',', '.')) || 0;
            let totalBs = 0; let itemsUI = []; let tempCart = { ...calcState.cart };
            const tapaPriceBs = window.roundBs(USD_PRICES.tapa * rate);
            let tapasRestantes = tempCart.tapa;
            
            ['b19', 'b12'].forEach(b => {
                let combos = Math.min(tempCart[b], tapasRestantes);
                if(combos > 0) {
                    const priceCombo = window.roundBs(BS_PRICES[b] + tapaPriceBs);
                    const sub = window.roundBs(combos * priceCombo);
                    totalBs = window.roundBs(totalBs + sub);
                    itemsUI.push({ 
                        name: `${b.slice(1)}L + Tapa`, 
                        qty: combos, 
                        price: priceCombo,
                        sub: sub,
                        code: COMBO_CODES[`${b}_tapa`] 
                    });
                    tempCart[b] -= combos; tapasRestantes -= combos;
                }
            });

            let p19 = tempCart.b19; let paid19 = p19; let saved19 = 0;
            if(calcState.promo && p19 >= 4) {
                saved19 = Math.floor(p19 / 4); paid19 -= saved19;
                document.getElementById('promo-banner').classList.remove('hidden');
                document.getElementById('promo-msg').innerText = `OFERTA JUEVES: Paga ${p19 - saved19} de ${p19} botellones de 19L (Ahorras ${saved19})`;
            } else { document.getElementById('promo-banner').classList.add('hidden'); }

            if(p19 > 0) {
                const sub = window.roundBs(paid19 * BS_PRICES.b19);
                totalBs = window.roundBs(totalBs + sub);
                itemsUI.push({ name: "Recarga 19L", qty: p19, price: BS_PRICES.b19, sub: sub, code: CODES.b19 });
            }

            ['b12', 'b8', 'b5'].forEach(k => { if(tempCart[k]>0){
                const sub = window.roundBs(tempCart[k]*BS_PRICES[k]); totalBs = window.roundBs(totalBs+sub);
                itemsUI.push({ name: `Recarga ${k.slice(1)}L`, qty: tempCart[k], price: BS_PRICES[k], sub: sub, code: CODES[k] });
            }});

            if(tapasRestantes > 0) {
                const sub = window.roundBs(tapasRestantes * tapaPriceBs); totalBs = window.roundBs(totalBs+sub);
                itemsUI.push({ name: "Tapa", qty: tapasRestantes, price: tapaPriceBs, sub: sub, code: CODES.tapa });
            }

            ['n19', 'n12', 'hielo', 'mantenimiento'].forEach(k => { if(tempCart[k]>0){
                const priceBs = window.roundBs(USD_PRICES[k] * rate);
                const sub = window.roundBs(tempCart[k] * priceBs);
                totalBs = window.roundBs(totalBs + sub);
                itemsUI.push({ name: k === 'mantenimiento' ? 'Manten.' : k.toUpperCase(), qty: tempCart[k], price: priceBs, sub: sub, code: CODES[k] });
            }});

            calcState.currentTotal = totalBs;
            document.getElementById('total-display').innerText = totalBs.toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            
            list.innerHTML = itemsUI.map(i => `
                <div class="flex justify-between bg-white p-3 rounded-2xl shadow-sm mx-1">
                    <div class="flex items-center gap-3">
                        <div class="bg-blue-600 text-white w-7 h-7 rounded-lg flex items-center justify-center font-black text-[10px]">${i.code}</div>
                        <div>
                            <div class="font-black text-slate-700 text-[11px]">${i.qty}x ${i.name}</div>
                            <div class="text-[8px] text-slate-400 font-black uppercase">Bs. ${i.price.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                        </div>
                    </div>
                    <span class="font-black text-slate-800 text-xs my-auto">Bs. ${i.sub.toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                </div>`).join('') || '<div class="text-center p-8 text-slate-300 italic text-sm">Carrito vacío</div>';
        };

        window.openCheckout = () => { 
            if(calcState.currentTotal === 0) return;
            document.getElementById('checkout-modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('checkout-content').classList.remove('translate-y-full'), 10);
            document.getElementById('co-total-display').innerText = calcState.currentTotal.toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            calculateChange();
        };

        window.closeCheckout = () => {
            document.getElementById('checkout-content').classList.add('translate-y-full');
            setTimeout(() => document.getElementById('checkout-modal').classList.add('hidden'), 300);
        };

        window.calculateChange = () => {
            const total = calcState.currentTotal;
            const paid = window.roundBs((parseFloat(document.getElementById('pay-cash').value)||0) + (parseFloat(document.getElementById('pay-digital').value)||0));
            const diff = window.roundBs(paid - total);
            const box = document.getElementById('change-box');
            const disp = document.getElementById('change-display');
            const lbl = document.getElementById('change-label');
            if(diff < 0) { 
                box.className = "rounded-2xl p-4 border-2 bg-rose-50 border-rose-200"; 
                disp.innerText = Math.abs(diff).toLocaleString('es-VE', {minimumFractionDigits:2, maximumFractionDigits: 2});
                lbl.innerText = "Resta por Pagar";
            } else { 
                box.className = "rounded-2xl p-4 border-2 bg-emerald-50 border-emerald-200"; 
                disp.innerText = diff.toLocaleString('es-VE', {minimumFractionDigits:2, maximumFractionDigits: 2});
                lbl.innerText = "Vuelto a Entregar";
            }
        };

        window.completeSale = () => { resetCart(); closeCheckout(); document.getElementById('pay-cash').value = ""; document.getElementById('pay-digital').value = ""; };

        function updateTasaLabel(t, c) {
            const l = document.getElementById('tasa-label'); l.innerText = t; l.className = `text-[8px] font-black uppercase mb-1 ${c}`;
        }
    </script>
</body>
</html>

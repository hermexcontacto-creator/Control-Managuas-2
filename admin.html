<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistemas Managua - Admin Precios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; -webkit-tap-highlight-color: transparent; }
        .fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="text-slate-200 pb-20">

    <div id="loader-admin" class="fixed inset-0 bg-[#0f172a] z-50 flex flex-col items-center justify-center transition-opacity duration-500">
        <svg class="animate-spin h-12 w-12 text-cyan-500 mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><circle class="opacity-25" cx="12" cy="12" r="10"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        <p class="text-cyan-400 font-bold tracking-[0.2em] text-xs uppercase animate-pulse">Obteniendo datos...</p>
    </div>

    <a href="index.html" class="fixed top-4 left-4 z-40 bg-slate-800 text-white p-3 rounded-full shadow-xl hover:bg-slate-700 transition-all border border-slate-700">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>

    <div class="max-w-md mx-auto pt-20 px-4 space-y-6">
        <div class="text-center fade-in-up">
            <h1 class="text-3xl font-black text-white tracking-tight mb-2">Panel Maestro</h1>
            <p class="text-slate-400 text-sm">Control Global y Seguridad</p>
        </div>

        <div class="glass-card rounded-3xl p-6 fade-in-up bg-gradient-to-br from-slate-800/80 to-blue-900/40 border-blue-500/30">
            <h2 class="text-xl font-black text-amber-400 mb-4 flex items-center tracking-wide">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                TASA BCV OFICIAL
            </h2>
            <div>
                <label class="block text-[10px] font-bold text-amber-500/80 mb-1 uppercase tracking-widest">Valor para toda la app</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-amber-400 font-black text-xl font-mono">Bs.</span>
                    <input type="number" step="0.01" id="tasa_bcv" class="w-full bg-slate-900/80 border-2 border-amber-500/50 rounded-xl py-3 pl-14 pr-4 text-white font-black text-xl focus:outline-none focus:border-amber-400 transition-all shadow-inner font-mono tracking-wider">
                </div>
            </div>
        </div>

        <div class="glass-card rounded-3xl p-6 fade-in-up" style="animation-delay: 100ms;">
            <h2 class="text-xl font-bold text-cyan-400 mb-4 flex items-center">Precios Bolívares (Bs)</h2>
            <div class="space-y-4">
                <div><label class="block text-xs font-semibold text-slate-400 mb-1">Botellón 19L</label><input type="number" id="precio_b19" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-white font-bold focus:outline-none focus:border-cyan-500 transition-all"></div>
                <div><label class="block text-xs font-semibold text-slate-400 mb-1">Botellón 12L</label><input type="number" id="precio_b12" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-white font-bold focus:outline-none focus:border-cyan-500 transition-all"></div>
                <div><label class="block text-xs font-semibold text-slate-400 mb-1">Botellón 8L</label><input type="number" id="precio_b8" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-white font-bold focus:outline-none focus:border-cyan-500 transition-all"></div>
                <div><label class="block text-xs font-semibold text-slate-400 mb-1">Botellón 5L</label><input type="number" id="precio_b5" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-white font-bold focus:outline-none focus:border-cyan-500 transition-all"></div>
            </div>
        </div>

        <div class="glass-card rounded-3xl p-6 fade-in-up" style="animation-delay: 200ms;">
            <h2 class="text-xl font-bold text-emerald-400 mb-4 flex items-center">Precios Dólares ($)</h2>
            <div class="space-y-4">
                <div><label class="block text-xs font-semibold text-slate-400 mb-1">Nuevo 19L</label><input type="number" id="precio_n19" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-white font-bold focus:outline-none focus:border-emerald-500 transition-all"></div>
                <div><label class="block text-xs font-semibold text-slate-400 mb-1">Nuevo 12L</label><input type="number" id="precio_n12" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-white font-bold focus:outline-none focus:border-emerald-500 transition-all"></div>
                <div><label class="block text-xs font-semibold text-slate-400 mb-1">Hielo</label><input type="number" id="precio_hielo" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-white font-bold focus:outline-none focus:border-emerald-500 transition-all"></div>
                <div><label class="block text-xs font-semibold text-slate-400 mb-1">Mantenimiento</label><input type="number" id="precio_mantenimiento" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-white font-bold focus:outline-none focus:border-emerald-500 transition-all"></div>
                <div><label class="block text-xs font-semibold text-slate-400 mb-1">Tapa Nueva</label><input type="number" id="precio_tapa" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-white font-bold focus:outline-none focus:border-emerald-500 transition-all"></div>
            </div>
        </div>

        <button onclick="guardarPrecios()" id="btnGuardar" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-black py-4 rounded-2xl shadow-lg transition-all active:scale-95 fade-in-up flex justify-center items-center" style="animation-delay: 300ms;">
            Guardar Cambios Globales
        </button>

        <div class="glass-card rounded-3xl p-6 fade-in-up" style="animation-delay: 400ms; margin-top: 2rem;">
            <h2 class="text-xl font-bold text-rose-400 mb-4 flex items-center">Seguridad</h2>
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1">Nueva Contraseña de Administrador</label>
                <div class="flex gap-2">
                    <input type="text" id="nueva_clave" placeholder="Escribe la nueva clave..." class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-white font-bold focus:outline-none focus:border-rose-500 transition-all">
                    <button onclick="cambiarClave()" id="btnClave" class="bg-rose-600 hover:bg-rose-500 text-white font-bold px-4 rounded-xl transition-colors whitespace-nowrap active:scale-95">Cambiar</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyRbNWYVtixYXYAG4xPCWOlXmz3CcLQfGiAo4dN7CbL98lHRqv0wcqvOufq6hzcdq0k/exec"; 

        window.addEventListener('DOMContentLoaded', cargarPreciosActuales);

        async function cargarPreciosActuales() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Carga la tasa nueva
                if(data.tasa_bcv) document.getElementById('tasa_bcv').value = data.tasa_bcv;
                
                if(data.b19) document.getElementById('precio_b19').value = data.b19;
                if(data.b12) document.getElementById('precio_b12').value = data.b12;
                if(data.b8) document.getElementById('precio_b8').value = data.b8;
                if(data.b5) document.getElementById('precio_b5').value = data.b5;
                if(data.n19) document.getElementById('precio_n19').value = data.n19;
                if(data.n12) document.getElementById('precio_n12').value = data.n12;
                if(data.hielo) document.getElementById('precio_hielo').value = data.hielo;
                if(data.mantenimiento) document.getElementById('precio_mantenimiento').value = data.mantenimiento;
                if(data.tapa) document.getElementById('precio_tapa').value = data.tapa;
                
            } catch (error) {
                console.error("Error cargando los precios:", error);
            } finally {
                const loader = document.getElementById('loader-admin');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }
            }
        }

        function guardarPrecios() {
            const btn = document.getElementById('btnGuardar');
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-3 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Guardando...`;
            btn.disabled = true;

            const preciosNuevos = {
                tasa_bcv: parseFloat(document.getElementById('tasa_bcv').value) || 0,
                b19: parseFloat(document.getElementById('precio_b19').value) || 0,
                b12: parseFloat(document.getElementById('precio_b12').value) || 0,
                b8: parseFloat(document.getElementById('precio_b8').value) || 0,
                b5: parseFloat(document.getElementById('precio_b5').value) || 0,
                n19: parseFloat(document.getElementById('precio_n19').value) || 0,
                n12: parseFloat(document.getElementById('precio_n12').value) || 0,
                hielo: parseFloat(document.getElementById('precio_hielo').value) || 0,
                mantenimiento: parseFloat(document.getElementById('precio_mantenimiento').value) || 0,
                tapa: parseFloat(document.getElementById('precio_tapa').value) || 0
            };

            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(preciosNuevos)
            })
            .then(response => response.json())
            .then(data => {
                alert("✅ Sistema actualizado exitosamente para todos los usuarios.");
                btn.innerHTML = textoOriginal;
                btn.disabled = false;
            })
            .catch(error => {
                alert("❌ Hubo un error de conexión: " + error);
                btn.innerHTML = textoOriginal;
                btn.disabled = false;
            });
        }

        function cambiarClave() {
            const nuevaClave = document.getElementById('nueva_clave').value;
            if (!nuevaClave || nuevaClave.length < 4) {
                alert("⚠️ La contraseña debe tener al menos 4 caracteres.");
                return;
            }

            const btn = document.getElementById('btnClave');
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = "...";
            btn.disabled = true;

            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "changePassword", newPassword: nuevaClave })
            })
            .then(response => response.json())
            .then(data => {
                if(data.success) {
                    alert("✅ Contraseña de administrador actualizada con éxito.");
                    document.getElementById('nueva_clave').value = "";
                } else {
                    alert("❌ Ocurrió un error al actualizar.");
                }
                btn.innerHTML = textoOriginal;
                btn.disabled = false;
            })
            .catch(error => {
                alert("❌ Error de conexión.");
                btn.innerHTML = textoOriginal;
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuadre Perfecto - Managua</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8 font-sans text-slate-800">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <div class="bg-blue-800 rounded-2xl p-6 text-white shadow-lg flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold flex items-center gap-2">
                    <i data-lucide="droplet" class="w-8 h-8 text-blue-300"></i> Cuadre Perfecto 19L
                </h1>
                <p class="text-blue-200 mt-1 opacity-90 flex items-center gap-1">
                    <i data-lucide="shield-check" class="w-4 h-4"></i> Distribución Creíble por Clientes
                </p>
            </div>
        </div>

        <div class="grid lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-semibold mb-4 text-slate-700 flex items-center gap-2">
                        <i data-lucide="calculator" class="w-5 h-5 text-blue-600"></i> Ingreso de Datos
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">Monto en Caja Físico</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-medium">Bs.</span>
                                <input type="number" id="amount1" placeholder="0.00" class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-xl outline-none" oninput="checkInputs()">
                            </div>
                        </div>
                        <a href="index.html" class="fixed top-4 left-4 z-50 bg-slate-800 text-white p-3 rounded-full shadow-xl hover:bg-slate-900 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>

                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">Monto del Sistema</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-medium">Bs.</span>
                                <input type="number" id="amount2" placeholder="0.00" class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-xl outline-none" oninput="checkInputs()">
                            </div>
                        </div>

                        <div class="pt-3 border-t border-slate-100 mt-2">
                            <div class="flex justify-between items-center mb-1">
                                <label class="block text-sm font-medium text-slate-600">Tasa BCV del Día</label>
                                <span id="bcv-status" class="text-[10px] font-bold px-2 py-0.5 rounded-full uppercase"></span>
                            </div>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-medium">$</span>
                                <input type="text" id="tasaBcv" inputmode="decimal" placeholder="Ej. 36.50" class="w-full pl-10 pr-4 py-2 border-2 border-slate-300 rounded-xl outline-none" onblur="saveTasa(this.value)">
                            </div>
                        </div>

                        <button id="calc-btn" onclick="handleCalculate()" disabled class="w-full mt-4 bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3 px-4 rounded-xl shadow-md transition-colors disabled:opacity-50 flex items-center justify-center gap-2">
                            Generar Maquillaje <i data-lucide="arrow-right" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <div class="bg-slate-100 p-5 rounded-2xl border border-slate-200">
                    <h3 class="text-sm font-semibold text-slate-700 mb-3 flex items-center gap-2">
                        <i data-lucide="info" class="w-4 h-4 text-blue-600"></i> Precios Activos
                    </h3>
                    <ul class="space-y-2 text-sm text-slate-600">
                        <li class="flex justify-between font-bold text-blue-800"><span>⭐ Botellón 19L</span> <span>Bs. 230.00</span></li>
                        <li class="flex justify-between"><span>Botellón 12L</span> <span>Bs. 180.00</span></li>
                        <li class="flex justify-between"><span>Botellón 8L</span> <span>Bs. 90.00</span></li>
                        <li class="flex justify-between"><span>Botellón 5L</span> <span>Bs. 80.00</span></li>
                    </ul>
                </div>
            </div>

            <div class="lg:col-span-8" id="results-container">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-full flex flex-col items-center justify-center text-center">
                    <i data-lucide="receipt" class="w-20 h-20 text-blue-100 mb-4"></i>
                    <h3 class="text-xl font-bold text-slate-700">Listo para cuadrar</h3>
                    <p class="text-slate-500 mt-2">Ingresa los montos y presiona calcular.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Inicializar iconos
        lucide.createIcons();

        // --- SISTEMA LOCALSTORAGE COMPARTIDO ---
        window.onload = () => {
            const savedRate = localStorage.getItem('MANAGUA_BCV_RATE');
            const savedDate = localStorage.getItem('MANAGUA_BCV_DATE');
            if(savedRate) {
                document.getElementById('tasaBcv').value = savedRate.replace('.', ',');
                checkDate(savedDate);
            }
        };

        function saveTasa(val) {
            if(!val) return;
            const cleanVal = val.replace(/,/g, '.');
            localStorage.setItem('MANAGUA_BCV_RATE', cleanVal);
            localStorage.setItem('MANAGUA_BCV_DATE', Date.now());
            checkDate(Date.now());
        }

        function checkDate(timestamp) {
            const statusBadge = document.getElementById('bcv-status');
            const today = new Date().toLocaleDateString();
            const saved = new Date(parseInt(timestamp)).toLocaleDateString();
            
            if(today === saved) {
                statusBadge.className = "text-[10px] font-bold px-2 py-0.5 rounded-full uppercase bg-green-100 text-green-700";
                statusBadge.innerText = "Al día";
            } else {
                statusBadge.className = "text-[10px] font-bold px-2 py-0.5 rounded-full uppercase bg-orange-100 text-orange-700 animate-pulse";
                statusBadge.innerText = "Desactualizada";
            }
        }

        function checkInputs() {
            const a1 = document.getElementById('amount1').value;
            const a2 = document.getElementById('amount2').value;
            document.getElementById('calc-btn').disabled = (!a1 && !a2);
        }

        // --- MOTOR MATEMÁTICO DE MAQUILLAJE ---
        function generateTransactions(breakdown, coins) {
            let pool = [];
            if (breakdown['19L'] > 0) {
                for (let i = 0; i < breakdown['19L']; i++) pool.push({ id: '19L', name: 'Botellón 19L', price: 23000 });
            }
            coins.forEach(coin => {
                if (breakdown[coin.id] > 0) {
                    for (let i = 0; i < breakdown[coin.id]; i++) pool.push({ id: coin.id, name: coin.name, price: coin.price });
                }
            });

            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }

            let transactions = [];
            let clientCounter = 1;

            while (pool.length > 0) {
                const itemsToTake = Math.min(Math.floor(Math.random() * 5) + 1, pool.length);
                const currentClientItems = pool.splice(0, itemsToTake);
                let receiptBreakdown = {};
                let receiptTotal = 0;
                
                currentClientItems.forEach(item => {
                    if (!receiptBreakdown[item.id]) receiptBreakdown[item.id] = { name: item.name, qty: 0, pricePerUnit: item.price };
                    receiptBreakdown[item.id].qty++;
                    receiptTotal += item.price;
                });

                transactions.push({ id: `TXN-${String(clientCounter).padStart(3, '0')}`, items: receiptBreakdown, total: receiptTotal });
                clientCounter++;
            }
            return transactions;
        }

        function handleCalculate() {
            const val1 = parseFloat(document.getElementById('amount1').value) || 0;
            const val2 = parseFloat(document.getElementById('amount2').value) || 0;
            const bcv = parseFloat(document.getElementById('tasaBcv').value.replace(',','.')) || 0;
            
            const missing = Math.abs(val1 - val2);
            const container = document.getElementById('results-container');

            if (missing === 0) {
                container.innerHTML = `<div class="bg-white p-6 rounded-2xl border border-green-200 text-center h-full flex flex-col justify-center"><h2 class="text-2xl font-bold text-green-600">Cuadre Perfecto</h2><p>La caja está en cero.</p></div>`;
                return;
            }

            const targetCents = Math.round(missing * 100);
            const coins = [ { id: '12L', name: 'Botellón 12L', price: 18000 }, { id: '8L', name: 'Botellón 8L', price: 9000 }, { id: '5L', name: 'Botellón 5L', price: 8000 } ];
            
            if (targetCents % 100 !== 0 && bcv > 0) {
                const capPriceCents = Math.round(0.15 * bcv * 100);
                if (capPriceCents > 0) coins.push({ id: 'Cap', name: 'Tapa', price: capPriceCents });
            }

            const price19L = 23000;
            const max19L = Math.floor(targetCents / price19L);
            const min19L = Math.max(0, max19L - 2); 

            let best19L = 0, minRemainder = Infinity, bestBreakdown = {};

            for (let q19 = max19L; q19 >= min19L; q19--) {
                let R = targetCents - (q19 * price19L);
                let dp = new Int32Array(R + 1).fill(0);
                let choice = new Int32Array(R + 1).fill(-1);
                let itemCounts = new Int32Array(R + 1).fill(0);

                for (let i = 0; i <= R; i++) {
                    for (let j = 0; j < coins.length; j++) {
                        let p = coins[j].price;
                        if (i >= p) {
                            let prev = i - p;
                            let newSum = dp[prev] + p;
                            let newCount = itemCounts[prev] + 1;

                            if (newSum > dp[i] || (newSum === dp[i] && newCount < itemCounts[i])) {
                                dp[i] = newSum; choice[i] = j; itemCounts[i] = newCount;
                            }
                        }
                    }
                }

                let currentRemainder = R - dp[R];
                if (currentRemainder < minRemainder) {
                    minRemainder = currentRemainder; best19L = q19;
                    bestBreakdown = {}; coins.forEach(c => bestBreakdown[c.id] = 0);
                    let curr = R;
                    while (curr > 0 && choice[curr] !== -1) {
                        bestBreakdown[coins[choice[curr]].id]++;
                        curr = curr - coins[choice[curr]].price;
                    }
                }
                if (minRemainder === 0) break;
            }

            const finalBreakdown = { '19L': best19L, ...bestBreakdown };
            const txns = generateTransactions(finalBreakdown, coins);

            // Renderizar resultados
            let html = `
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="mb-6 pb-6 border-b border-slate-200 flex flex-col sm:flex-row sm:items-end justify-between gap-4">
                    <div><p class="text-sm text-slate-500 font-bold uppercase tracking-wider">A Justificar</p><h2 class="text-4xl font-black text-slate-800">Bs. ${missing.toFixed(2)}</h2></div>
                    <div class="p-3 rounded-xl flex items-center gap-3 border-2 ${minRemainder === 0 ? 'bg-green-50 border-green-200 text-green-700' : 'bg-amber-50 border-amber-200 text-amber-700'}">
                        <div><p class="text-xs font-bold uppercase">${minRemainder === 0 ? 'Cuadre Exacto' : 'Sobrante'}</p>
                        ${minRemainder !== 0 ? `<p class="font-black text-lg">Bs. ${(minRemainder / 100).toFixed(2)}</p>` : ''}</div>
                    </div>
                </div>
                <div class="mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200"><h3 class="text-sm font-bold mb-3 uppercase tracking-wider">Total de Artículos</h3><div class="flex flex-wrap gap-2">`;
            
            if(finalBreakdown['19L'] > 0) html += `<span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm font-bold border border-blue-200">${finalBreakdown['19L']}x 19L</span>`;
            coins.forEach(c => { if(finalBreakdown[c.id] > 0) html += `<span class="bg-slate-200 px-3 py-1 rounded-full text-sm font-bold border border-slate-300">${finalBreakdown[c.id]}x ${c.name}</span>`; });
            
            html += `</div></div><div class="space-y-3">`;
            
            txns.forEach((txn, i) => {
                html += `<div class="bg-white border border-slate-200 rounded-lg shadow-sm"><div class="bg-slate-100 px-4 py-2 flex justify-between items-center border-b font-bold text-sm text-slate-600"><span>Cliente #${i+1}</span><span class="text-blue-800">Bs. ${(txn.total/100).toFixed(2)}</span></div><div class="p-4 space-y-2">`;
                Object.entries(txn.items).forEach(([id, data]) => {
                    html += `<div class="flex justify-between text-sm"><span class="font-semibold">${data.qty}x ${data.name}</span><span class="text-slate-500">Bs. ${(data.qty*data.pricePerUnit/100).toFixed(2)}</span></div>`;
                });
                html += `</div></div>`;
            });

            html += `</div></div>`;
            container.innerHTML = html;
        }
    </script>
</body>
</html>
